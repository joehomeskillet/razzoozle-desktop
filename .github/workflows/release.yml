name: Release

# Build a Windows NSIS .exe, minisign-sign the electron-updater feed (latest.yml),
# and publish a GitHub prerelease. Triggered by pushing a semver tag.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      npm_config_jobs: max
      JOBS: max
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + assets)
        run: npm run build

      - name: Package (electron-builder NSIS)
        # UNSIGNED by design (F1). --publish never: build + write latest.yml, do
        # NOT auto-upload (the explicit gh release step uploads).
        run: npx electron-builder --publish never

      - name: Install minisign (jedisct1 0.11 — supports -W + unencrypted keys)
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP\minisign.zip"
          Invoke-WebRequest -Uri "https://github.com/jedisct1/minisign/releases/download/0.11/minisign-0.11-win64.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\minisign" -Force
          $bin = (Get-ChildItem -Path "$env:RUNNER_TEMP\minisign" -Recurse -Filter minisign.exe | Select-Object -First 1).DirectoryName
          echo "$bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$bin\minisign.exe" -v

      - name: Sign latest.yml with minisign
        shell: pwsh
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          Write-Host "release/ contents:"; Get-ChildItem release | Format-Table Name,Length
          if (-not (Test-Path release/latest.yml)) { throw "release/latest.yml not found (electron-builder did not emit the update feed)" }
          $keyFile = "$env:RUNNER_TEMP\minisign.key"
          [System.IO.File]::WriteAllText($keyFile, $env:MINISIGN_SECRET_KEY)
          "" | minisign -S -W -s $keyFile -m release/latest.yml
          if ($LASTEXITCODE -ne 0) { throw "minisign signing failed" }
          Remove-Item $keyFile -Force
          if (-not (Test-Path release/latest.yml.minisig)) { throw "latest.yml.minisig not produced" }

      - name: Create GitHub prerelease + upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} `
            (Get-ChildItem release/*.exe) `
            release/latest.yml `
            release/latest.yml.minisig `
            (Get-ChildItem release/*.blockmap) `
            --prerelease `
            --title "Razzoozle Desktop ${{ github.ref_name }} (Beta)" `
            --notes "Unsigned beta build (one-time Windows SmartScreen warning on first run). Update integrity is enforced client-side via the minisign-signed latest.yml. See README for details."
